# Browser Configuration
browser=chrome
headless=false
browser.maximize=true

# Application URL
base.url=https://theknowbefore.com

# Timeouts (seconds)
implicit.wait=10
explicit.wait=20
page.load.timeout=30
script.timeout=30
short.wait=5

# Reporting
reports.path=test-output/reports/
screenshots.path=test-output/screenshots/
report.name=KnowBefore_Test_Report

# Logging
log.level=INFO
log.path=logs/

# Test Data
testdata.path=src/test/resources/testdata/

# Environment
environment=production

# Parallel Execution
thread.count=3
